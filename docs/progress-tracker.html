<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard - Progress Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #1D1D1F;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            color: white;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 20px;
            opacity: 0.9;
            font-weight: 400;
        }

        .progress-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #0071E3;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #86868B;
            font-weight: 500;
        }

        .phases-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }

        .phase-item {
            padding: 20px;
            border-bottom: 1px solid #E5E5E7;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .phase-item:last-child {
            border-bottom: none;
        }

        .phase-item:hover {
            background: #F5F5F7;
            border-radius: 12px;
        }

        .phase-item.completed {
            opacity: 0.6;
        }

        .phase-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #D1D1D6;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .checkbox.checked {
            background: linear-gradient(135deg, #0071E3, #00A3FF);
            border-color: #0071E3;
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .phase-number {
            font-size: 14px;
            font-weight: 600;
            color: #86868B;
            min-width: 80px;
        }

        .phase-content {
            flex: 1;
        }

        .phase-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1D1D1F;
        }

        .phase-duration {
            font-size: 13px;
            color: #86868B;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #E5E5E7;
            border-radius: 4px;
            overflow: hidden;
            margin: 32px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0071E3, #00A3FF);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0071E3, #00A3FF);
            color: white;
            box-shadow: 0 4px 16px rgba(0, 113, 227, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 113, 227, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #0071E3;
            border: 2px solid #0071E3;
        }

        .btn-secondary:hover {
            background: #F5F5F7;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .phase-item {
            animation: fadeIn 0.5s ease-out backwards;
        }

        .phase-item:nth-child(1) { animation-delay: 0.05s; }
        .phase-item:nth-child(2) { animation-delay: 0.1s; }
        .phase-item:nth-child(3) { animation-delay: 0.15s; }
        .phase-item:nth-child(4) { animation-delay: 0.2s; }
        .phase-item:nth-child(5) { animation-delay: 0.25s; }
        .phase-item:nth-child(6) { animation-delay: 0.3s; }
        .phase-item:nth-child(7) { animation-delay: 0.35s; }
        .phase-item:nth-child(8) { animation-delay: 0.4s; }
        .phase-item:nth-child(9) { animation-delay: 0.45s; }
        .phase-item:nth-child(10) { animation-delay: 0.5s; }
        .phase-item:nth-child(11) { animation-delay: 0.55s; }
        .phase-item:nth-child(12) { animation-delay: 0.6s; }
        .phase-item:nth-child(13) { animation-delay: 0.65s; }
        .phase-item:nth-child(14) { animation-delay: 0.7s; }
        .phase-item:nth-child(15) { animation-delay: 0.75s; }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .phases-container {
                padding: 20px;
            }

            .phase-header {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 AI Dashboard Development</h1>
            <p>Apple-Inspired 15-Phase Roadmap</p>
        </div>

        <div class="progress-stats">
            <div class="stat-card">
                <div class="stat-value" id="completedCount">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="progressPercent">0%</div>
                <div class="stat-label">Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="remainingCount">15</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <div class="phases-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 0%"></div>
            </div>

            <div id="phasesList"></div>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="exportProgress()">📥 Export Progress</button>
                <button class="btn btn-secondary" onclick="resetProgress()">🔄 Reset All</button>
            </div>
        </div>
    </div>

    <script>
        const phases = [
            { id: 1, title: "Foundation & Design System", duration: "1-2 days" },
            { id: 2, title: "Landing Page & Navigation", duration: "1 day" },
            { id: 3, title: "File Upload Interface", duration: "1-2 days" },
            { id: 4, title: "Backend API Foundation", duration: "1-2 days" },
            { id: 5, title: "Data Table Display", duration: "1-2 days" },
            { id: 6, title: "Chart Visualization Foundation", duration: "2 days" },
            { id: 7, title: "AI Service Integration", duration: "1-2 days" },
            { id: 8, title: "Data Processing Engine", duration: "2 days" },
            { id: 9, title: "Chat Interface", duration: "2 days" },
            { id: 10, title: "Insights Generation", duration: "2 days" },
            { id: 11, title: "Dashboard Layout", duration: "1-2 days" },
            { id: 12, title: "Advanced Visualizations", duration: "2 days" },
            { id: 13, title: "UI Polish & Micro-interactions", duration: "2 days" },
            { id: 14, title: "Testing & Optimization", duration: "2 days" },
            { id: 15, title: "Deployment & Documentation", duration: "1-2 days" }
        ];

        // Load progress from localStorage
        let completedPhases = JSON.parse(localStorage.getItem('completedPhases')) || [];

        function renderPhases() {
            const phasesList = document.getElementById('phasesList');
            phasesList.innerHTML = phases.map(phase => `
                <div class="phase-item ${completedPhases.includes(phase.id) ? 'completed' : ''}" 
                     onclick="togglePhase(${phase.id})">
                    <div class="phase-header">
                        <div class="checkbox ${completedPhases.includes(phase.id) ? 'checked' : ''}"></div>
                        <div class="phase-number">Phase ${phase.id}</div>
                        <div class="phase-content">
                            <div class="phase-title">${phase.title}</div>
                            <div class="phase-duration">${phase.duration}</div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            updateStats();
        }

        function togglePhase(phaseId) {
            if (completedPhases.includes(phaseId)) {
                completedPhases = completedPhases.filter(id => id !== phaseId);
            } else {
                completedPhases.push(phaseId);
            }
            
            localStorage.setItem('completedPhases', JSON.stringify(completedPhases));
            renderPhases();
        }

        function updateStats() {
            const completed = completedPhases.length;
            const total = phases.length;
            const percentage = Math.round((completed / total) * 100);
            const remaining = total - completed;

            document.getElementById('completedCount').textContent = completed;
            document.getElementById('progressPercent').textContent = percentage + '%';
            document.getElementById('remainingCount').textContent = remaining;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        function exportProgress() {
            const data = {
                totalPhases: phases.length,
                completed: completedPhases.length,
                percentage: Math.round((completedPhases.length / phases.length) * 100),
                completedPhases: phases.filter(p => completedPhases.includes(p.id)),
                remainingPhases: phases.filter(p => !completedPhases.includes(p.id))
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ai-dashboard-progress-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function resetProgress() {
            if (confirm('Are you sure you want to reset all progress?')) {
                completedPhases = [];
                localStorage.setItem('completedPhases', JSON.stringify(completedPhases));
                renderPhases();
            }
        }

        // Initial render
        renderPhases();
    </script>
</body>
</html>
